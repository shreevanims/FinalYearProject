<!DOCTYPE html>
<html>
<head>
    <title>Brain Tumor Detection</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #020617, #1e3a8a);
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* 🔵 BUBBLES (slightly faster) */
        .bubbles {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .bubbles span {
            position: absolute;
            bottom: -50px;
            width: 7px;
            height: 7px;
            background: rgba(56,189,248,0.35);
            border-radius: 50%;
            animation: rise 8s linear infinite; /* faster */
        }

        .bubbles span:nth-child(1){ left:10%; animation-duration:7s;}
        .bubbles span:nth-child(2){ left:30%; animation-duration:9s;}
        .bubbles span:nth-child(3){ left:50%; animation-duration:6s;}
        .bubbles span:nth-child(4){ left:70%; animation-duration:8s;}
        .bubbles span:nth-child(5){ left:85%; animation-duration:10s;}

        @keyframes rise {
            0% { transform: translateY(0); opacity: 0; }
            50% { opacity: 0.6; }
            100% { transform: translateY(-100vh); opacity: 0; }
        }

        /* 🔵 ULTRA LIGHT + SLOW SCAN */
        .scan-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .scan-bg::before,
        .scan-bg::after {
            content: "";
            position: absolute;
            width: 100%;
            height: 1px; /* very thin */
            background: linear-gradient(90deg, transparent, rgba(56,189,248,0.25), transparent);
            opacity: 0.3;
        }

        /* slower now */
        .scan-bg::before {
            animation: scan1 3s linear infinite;
        }

        .scan-bg::after {
            animation: scan2 3s linear infinite;
        }

        .scan-bg span {
            position: absolute;
            width: 100%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(96,165,250,0.2), transparent);
            animation: scan3 3s linear infinite;
            opacity: 0.25;
        }

        @keyframes scan1 {
            0% { top: 0%; }
            100% { top: 100%; }
        }

        @keyframes scan2 {
            0% { top: -40%; }
            100% { top: 60%; }
        }

        @keyframes scan3 {
            0% { top: -80%; }
            100% { top: 20%; }
        }

        /* 🔹 MAIN BOX */
        .container {
            position: relative;
            z-index: 1;

            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(15px);
            padding: 30px;
            border-radius: 18px;

            text-align: center;
            width: 360px;
            color: white;

            transform: perspective(800px) rotateX(3deg) rotateY(-3deg);
            transition: 0.3s;

            border: 1px solid rgba(0,150,255,0.3);
            animation: glow 2s infinite alternate;
        }

        @keyframes glow {
            from { box-shadow: 0 0 10px rgba(0,150,255,0.3); }
            to   { box-shadow: 0 0 25px rgba(0,150,255,0.6); }
        }

        .container:hover {
            transform: perspective(800px) rotateX(0deg) rotateY(0deg) scale(1.05);
        }

        /* 🔥 TITLE */
        h1 {
            margin-bottom: 20px;
            font-size: 26px;
            font-weight: 700;
            color: #ffffff;
            text-shadow:
                0 0 10px #00c6ff,
                0 0 20px #00aaff,
                0 0 30px #0072ff;
        }

        /* 📁 FILE INPUT */
        input[type="file"] {
            margin: 15px 0;
            padding: 8px;
            border-radius: 8px;
            border: none;
            background: rgba(255,255,255,0.2);
            color: white;
        }

        input[type="file"]::file-selector-button {
            padding: 6px 12px;
            border: none;
            border-radius: 6px;
            background: #38bdf8;
            color: white;
            cursor: pointer;
        }

        /* 🔘 BUTTON */
        button {
            padding: 10px 22px;
            background: linear-gradient(45deg, #2563eb, #06b6d4);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 8px;
            box-shadow: 0 5px 15px rgba(0,150,255,0.5);
        }

        button:hover {
            transform: scale(1.05);
        }

        /* 🖼 IMAGE */
        img {
            margin-top: 15px;
            width: 220px;
            height: 220px;
            object-fit: cover;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.8);
        }

        /* 🔥 RESULT */
        .result {
            margin-top: 15px;
            font-size: 20px;
            font-weight: bold;
            color: #22c55e;
            text-shadow: 0 0 10px rgba(34,197,94,0.8);
        }

    </style>
</head>

<body>

<!-- 🔵 BACKGROUND EFFECTS -->
<div class="bubbles">
    <span></span><span></span><span></span><span></span><span></span>
</div>

<div class="scan-bg">
    <span></span>
</div>

<div class="container">
    <h1>🧠 Brain Tumor Detection</h1>

    <form method="POST" enctype="multipart/form-data">
        <input type="file" name="file" required>
        <br>
        <button type="submit">Predict</button>
    </form>

    {% if img_path %}
        <img src="{{ img_path }}">
    {% endif %}

    {% if prediction %}
        <div class="result">
            Prediction: {{ prediction }}
        </div>
    {% endif %}
</div>

</body>
</html>
